<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Luzerge</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
  <link rel="icon" type="image/svg+xml" href="/img/favicon.svg" />
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="stylesheet" href="/css/dashboard.css" />
</head>
<body class="auth-page">
  <canvas id="loginStarfield" class="page-starfield" aria-hidden="true"></canvas>

  <div class="auth-card">
    <a href="/" class="auth-logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" fill="currentColor"/></svg>
      Luzerge
    </a>

    <h1 class="auth-title">Cache Manager</h1>
    <p class="auth-subtitle">Sign in to manage your website's CDN cache.</p>

    <button id="googleBtn" class="btn-google" type="button">
      <svg width="20" height="20" viewBox="0 0 48 48" aria-hidden="true">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.29-8.16 2.29-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        <path fill="none" d="M0 0h48v48H0z"/>
      </svg>
      Continue with Google
    </button>

    <p class="auth-footer">
      By signing in, you agree to our
      <a href="/privacy.html">Privacy Policy</a>.
    </p>

    <div id="authError" class="auth-error" hidden></div>
  </div>

  <!-- Supabase JS via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    // Starfield animation
    ;(function () {
      const canvas = document.getElementById('loginStarfield')
      if (!canvas || window.matchMedia('(prefers-reduced-motion: reduce)').matches) return
      const ctx = canvas.getContext('2d')
      const stars = []
      const COUNT = 120
      function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight }
      resize(); window.addEventListener('resize', resize)
      for (let i = 0; i < COUNT; i++) stars.push({ x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight, r: Math.random() * 1.2 + 0.3, phase: Math.random() * Math.PI * 2, speed: Math.random() * 0.02 + 0.005 })
      function draw(t) { ctx.clearRect(0, 0, canvas.width, canvas.height); for (const s of stars) { const o = 0.3 + 0.4 * Math.sin(s.phase + t * s.speed); ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fillStyle = `rgba(255,255,255,${o})`; ctx.fill() } requestAnimationFrame(draw) }
      requestAnimationFrame(draw)
    })()
  </script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // If already logged in, route by role
      try {
        const session = await getSession()
        if (session) {
          const profile = await getProfile()
          if (profile?.role === 'admin') {
            window.location.replace('/admin.html')
          } else {
            window.location.replace('/dashboard.html')
          }
          return
        }
      } catch (e) {
        console.warn('Session check failed:', e)
      }

      document.getElementById('googleBtn').addEventListener('click', async () => {
        const btn = document.getElementById('googleBtn')
        btn.disabled = true
        btn.textContent = 'Redirecting...'

        // Whitelist allowed redirect origins to prevent open-redirect attacks
        const ALLOWED_ORIGINS = ['https://luzerge.com', 'https://www.luzerge.com', 'http://localhost:3000', 'http://localhost:5500', 'http://localhost:5501']
        const origin = ALLOWED_ORIGINS.includes(location.origin) ? location.origin : 'https://luzerge.com'

        const { data, error } = await _supabase.auth.signInWithOAuth({
          provider: 'google',
          options: {
            redirectTo: `${origin}/dashboard.html`,
            skipBrowserRedirect: false,
          },
        })

        // Fallback: if the SDK didn't redirect (extension blocked it), do it manually
        if (!error && data?.url) {
          window.location.href = data.url
        }

        if (error) {
          const el = document.getElementById('authError')
          el.textContent = error.message
          el.hidden = false
          btn.disabled = false
          btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.29-8.16 2.29-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg> Continue with Google`
        }
      })
    })
  </script>
</body>
</html>
