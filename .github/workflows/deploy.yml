name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

concurrency:
  group: production-deploy
  cancel-in-progress: false  # Never cancel a production deploy in progress

env:
  SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
  CLOUDFLARE_ZONE_ID:  ${{ secrets.CLOUDFLARE_ZONE_ID }}

jobs:
  # ─── Job 1: Lint & Validate ─────────────────────────────────────────────────
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for secrets in code
        run: |
          FAIL=0
          # Check for service role keys, API tokens, passwords in frontend code
          for PATTERN in "service_role" "SUPABASE_SERVICE_ROLE" "SUPABASE_DB_PASSWORD" "CLOUDFLARE_API_TOKEN" "RESEND_API_KEY" "eyJhbGciOi.*service_role"; do
            if grep -rn "$PATTERN" index.html js/ css/ login.html dashboard.html admin.html 2>/dev/null; then
              echo "ERROR: Found secret pattern '$PATTERN' in source files!"
              FAIL=1
            fi
          done
          # Check for .env files that shouldn't be committed
          if [ -f ".env.local" ] && git ls-files --error-unmatch .env.local 2>/dev/null; then
            echo "ERROR: .env.local is tracked by git!"
            FAIL=1
          fi
          if [ "$FAIL" -eq 1 ]; then
            echo "Secret scan FAILED — review findings above"
            exit 1
          fi
          echo "Secret scan passed."

  # ─── Job 2: Deploy to Supabase ──────────────────────────────────────────────
  deploy-supabase:
    name: Deploy Supabase (DB + Functions)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Run database migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link --project-ref $SUPABASE_PROJECT_ID
          supabase db push --password ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy api \
            --project-ref $SUPABASE_PROJECT_ID \
            --no-verify-jwt
          supabase functions deploy encrypt-credentials \
            --project-ref $SUPABASE_PROJECT_ID
          supabase functions deploy cf-proxy \
            --project-ref $SUPABASE_PROJECT_ID \
            --no-verify-jwt
          supabase functions deploy lumi-chat \
            --project-ref $SUPABASE_PROJECT_ID \
            --no-verify-jwt

      - name: Set Function Secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase secrets set \
            --project-ref $SUPABASE_PROJECT_ID \
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }} \
            NOTIFICATION_EMAIL=${{ secrets.NOTIFICATION_EMAIL }} \
            ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }} \
            HMAC_PEPPER=${{ secrets.HMAC_PEPPER }} \
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}

  # ─── Job 3: Deploy Frontend ──────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Static Assets)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build static assets
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          mkdir -p dist
          # Copy all frontend files from root to dist
          cp index.html dist/
          cp -r css dist/
          cp -r js dist/
          cp login.html dist/
          cp dashboard.html dist/
          [ -f admin.html ] && cp admin.html dist/ || true
          [ -f privacy.html ] && cp privacy.html dist/ || true
          [ -f status.html ] && cp status.html dist/ || true
          [ -f robots.txt ] && cp robots.txt dist/ || true
          [ -f sitemap.xml ] && cp sitemap.xml dist/ || true
          [ -d img ] && cp -r img dist/ || true

          # Generate config.js from secrets (the file is gitignored)
          cat > dist/js/config.js <<JSEOF
          'use strict'
          const __LUZERGE_CONFIG = {
            SUPABASE_URL: 'https://${SUPABASE_PROJECT_ID}.supabase.co',
            SUPABASE_ANON_KEY: '${SUPABASE_ANON_KEY}',
          }
          JSEOF
          echo "Build complete."

      - name: Add build metadata
        run: |
          echo "{\"version\":\"${{ github.sha }}\",\"deployed\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" \
            > dist/version.json

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: luzerge.com
          force_orphan: true
          commit_message: 'deploy: ${{ github.sha }}'

  # ─── Job 4: Deploy Cloudflare Worker ────────────────────────────────────────
  deploy-worker:
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy Worker via API
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: 5d17623611271bc6efceb8d9a115076f
        run: |
          # Upload worker script via Cloudflare API directly (avoids wrangler /memberships call)
          WORKER_CONTENT=$(cat cloudflare/workers/edge-cache.js)

          # Create metadata for ES module worker
          METADATA='{"main_module":"edge-cache.js","bindings":[{"type":"plain_text","name":"ENVIRONMENT","text":"production"},{"type":"plain_text","name":"SITE_URL","text":"https://luzerge.com"}]}'

          # Upload using multipart form
          RESPONSE=$(curl -s -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/scripts/luzerge-edge" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -F "metadata=${METADATA};type=application/json" \
            -F "edge-cache.js=@cloudflare/workers/edge-cache.js;type=application/javascript+module")

          echo "Response: $RESPONSE"

          SUCCESS=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('success', False))")
          if [ "$SUCCESS" != "True" ]; then
            echo "Worker upload failed!"
            exit 1
          fi
          echo "Worker deployed successfully."

  # ─── Job 5: Purge Cloudflare Cache ──────────────────────────────────────────
  purge-cache:
    name: Purge Cloudflare CDN Cache
    runs-on: ubuntu-latest
    needs: [deploy-supabase, deploy-frontend, deploy-worker]
    steps:
      - name: Purge everything (post-deploy)
        run: |
          RESPONSE=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')

          echo "Cloudflare response: $RESPONSE"

          SUCCESS=$(echo $RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['success'])")
          if [ "$SUCCESS" != "True" ]; then
            echo "Cache purge failed!"
            exit 1
          fi
          echo "Cache purged successfully."

  # ─── Job 6: Smoke Tests ─────────────────────────────────────────────────────
  smoke-test:
    name: Post-Deploy Smoke Tests
    runs-on: ubuntu-latest
    needs: purge-cache
    steps:
      - name: Wait for DNS/cache propagation
        run: sleep 30

      - name: Test site is live
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://luzerge.com)
          echo "Site status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: Site returned $STATUS"
            exit 1
          fi
          echo "PASS: Site is live"


      - name: Check SSL certificate
        run: |
          echo | openssl s_client -connect luzerge.com:443 -servername luzerge.com 2>/dev/null \
            | openssl x509 -noout -dates
          echo "PASS: SSL certificate valid"

      - name: Check security headers
        run: |
          HEADERS=$(curl -sI https://luzerge.com)
          echo "$HEADERS"
          FAIL=0
          for HEADER in "x-content-type-options" "x-frame-options" "strict-transport-security" "content-security-policy" "referrer-policy" "permissions-policy" "x-permitted-cross-domain-policies"; do
            if echo "$HEADERS" | grep -qi "$HEADER"; then
              echo "PASS: $HEADER present"
            else
              echo "FAIL: $HEADER missing"
              FAIL=1
            fi
          done
          if [ "$FAIL" -eq 1 ]; then
            echo "ERROR: Required security headers are missing!"
            exit 1
          fi

      - name: Notify on success
        if: success()
        run: |
          echo "Deployment successful!"
          echo "Version: ${{ github.sha }}"
          echo "Time: $(date -u)"

      - name: Notify on failure
        if: failure()
        run: |
          echo "DEPLOYMENT FAILED — check logs above"
          echo "SHA: ${{ github.sha }}"
