<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Service Status | Real-Time Platform Health | Luzerge</title>
  <meta name="description" content="Real-time service status for Luzerge. Check current uptime, active incidents, scheduled maintenance, and platform health for all monitoring and CDN services." />
  <meta name="keywords" content="Luzerge status, service status, uptime status, platform health, Luzerge incidents" />
  <link rel="canonical" href="https://luzerge.com/status.html" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Luzerge" />
  <meta property="og:url" content="https://luzerge.com/status.html" />
  <meta property="og:title" content="Service Status | Real-Time Platform Health | Luzerge" />
  <meta property="og:description" content="Real-time service status for Luzerge. Check uptime, incidents, and platform health." />
  <meta property="og:image" content="https://luzerge.com/img/og-image.png" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Service Status | Real-Time Platform Health | Luzerge" />
  <meta name="twitter:description" content="Real-time service status for Luzerge. Check uptime, incidents, and platform health." />
  <meta name="twitter:image" content="https://luzerge.com/img/og-image.png" />

  <!-- Geographic targeting -->
  <meta name="geo.region" content="PH" />
  <meta name="geo.placename" content="Cebu City" />
  <meta name="geo.position" content="10.3157;123.8854" />

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebPage",
    "name": "Luzerge Service Status",
    "url": "https://luzerge.com/status.html",
    "description": "Real-time platform health, uptime, and incident tracking for Luzerge services.",
    "publisher": {
      "@type": "Organization",
      "name": "Luzerge",
      "url": "https://luzerge.com",
      "email": "luzergeservices@gmail.com"
    }
  }
  </script>

  <link rel="icon" type="image/svg+xml" href="/img/favicon.svg" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0e1a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    .container { max-width: 720px; margin: 0 auto; }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .header__logo {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 1.25rem;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
      margin-bottom: 1rem;
    }
    .header__domain {
      font-size: 1.5rem;
      font-weight: 800;
      color: #fff;
    }
    .header__updated {
      color: #64748b;
      font-size: 0.8125rem;
      margin-top: 0.5rem;
    }

    /* Status badge */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 28px;
      border-radius: 999px;
      font-size: 1.125rem;
      font-weight: 700;
      margin: 1.5rem 0;
    }
    .status-badge--up { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
    .status-badge--down { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
    .status-badge--unknown { background: rgba(148,163,184,0.15); color: #94a3b8; border: 1px solid rgba(148,163,184,0.3); }
    .status-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
    .status-badge--up .status-dot { background: #22c55e; }
    .status-badge--down .status-dot { background: #ef4444; }
    .status-badge--unknown .status-dot { background: #94a3b8; animation: none; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* Uptime stats */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1rem;
      margin: 2rem 0;
    }
    .stat-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 1.25rem;
      text-align: center;
    }
    .stat-card__value {
      font-size: 1.5rem;
      font-weight: 800;
      color: #fff;
    }
    .stat-card__label {
      font-size: 0.75rem;
      color: #64748b;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* 90-day chart */
    .chart-section {
      margin: 2.5rem 0;
    }
    .chart-section h3 {
      font-size: 0.875rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 1rem;
    }
    .uptime-bars {
      display: flex;
      gap: 2px;
      align-items: flex-end;
      height: 40px;
    }
    .uptime-bar {
      flex: 1;
      min-width: 2px;
      border-radius: 2px;
      height: 100%;
      position: relative;
      cursor: pointer;
    }
    .uptime-bar:hover::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      color: #e2e8f0;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      white-space: nowrap;
      z-index: 10;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .uptime-bar--good { background: #22c55e; }
    .uptime-bar--degraded { background: #f59e0b; }
    .uptime-bar--bad { background: #ef4444; }
    .uptime-bar--none { background: rgba(255,255,255,0.08); }
    .chart-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      font-size: 11px;
      color: #475569;
    }

    /* Incidents */
    .incidents {
      margin: 2.5rem 0;
    }
    .incidents h3 {
      font-size: 0.875rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 1rem;
    }
    .incident {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      margin-bottom: 0.75rem;
    }
    .incident__time {
      font-size: 0.8125rem;
      color: #94a3b8;
    }
    .incident__duration {
      font-weight: 600;
      color: #ef4444;
      margin-top: 4px;
    }
    .incident__cause {
      font-size: 0.8125rem;
      color: #64748b;
      margin-top: 4px;
    }
    .no-incidents {
      color: #22c55e;
      font-weight: 500;
      padding: 1rem;
      text-align: center;
      background: rgba(34,197,94,0.08);
      border: 1px solid rgba(34,197,94,0.2);
      border-radius: 8px;
    }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid rgba(255,255,255,0.08);
      color: #475569;
      font-size: 0.8125rem;
    }
    .footer a { color: #3b82f6; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }

    /* Loading / Error */
    .loading, .error-msg {
      text-align: center;
      padding: 4rem 2rem;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg { color: #ef4444; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <a href="https://luzerge.com" class="header__logo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" fill="currentColor"/></svg>
        Luzerge
      </a>
      <div id="content">
        <div class="loading">
          <div class="spinner"></div>
          <p>Loading status data...</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      var SUPABASE_URL = 'https://byzuraeyhrxxpztredri.supabase.co'
      var content = document.getElementById('content')
      var params = new URLSearchParams(window.location.search)
      var token = params.get('token')

      if (!token) {
        content.innerHTML = '<div class="error-msg"><p>No status token provided.</p><p style="color:#64748b;margin-top:8px">Add ?token=YOUR_TOKEN to the URL</p></div>'
        return
      }

      fetch(SUPABASE_URL + '/functions/v1/status-api?token=' + encodeURIComponent(token))
        .then(function(res) { return res.json() })
        .then(function(data) {
          if (data.error) {
            content.innerHTML = '<div class="error-msg"><p>' + data.error + '</p></div>'
            return
          }
          render(data)
        })
        .catch(function() {
          content.innerHTML = '<div class="error-msg"><p>Failed to load status data.</p></div>'
        })

      function render(data) {
        var statusClass = data.current_status === 'up' ? 'up' : data.current_status === 'down' ? 'down' : 'unknown'
        var statusText = data.current_status === 'up' ? 'All Systems Operational' : data.current_status === 'down' ? 'Service Disruption' : 'Unknown'

        var lastChecked = data.last_checked ? new Date(data.last_checked).toLocaleString() : 'Never'

        // Stats cards
        var statsHtml = ''
        var periods = ['24h', '7d', '30d', '90d']
        for (var i = 0; i < periods.length; i++) {
          var p = periods[i]
          var val = data.uptime[p] || 'N/A'
          if (val !== 'N/A') val = parseFloat(val).toFixed(2) + '%'
          statsHtml += '<div class="stat-card"><div class="stat-card__value">' + val + '</div><div class="stat-card__label">' + p + ' Uptime</div></div>'
        }
        if (data.latency_ms) {
          statsHtml += '<div class="stat-card"><div class="stat-card__value">' + data.latency_ms + 'ms</div><div class="stat-card__label">Latency</div></div>'
        }

        // 90-day bars
        var barsHtml = ''
        if (data.daily && data.daily.length > 0) {
          for (var j = 0; j < data.daily.length; j++) {
            var d = data.daily[j]
            var pct = parseFloat(d.uptime_pct)
            var barClass = pct >= 99.5 ? 'good' : pct >= 95 ? 'degraded' : 'bad'
            barsHtml += '<div class="uptime-bar uptime-bar--' + barClass + '" data-tooltip="' + d.date + ': ' + d.uptime_pct + '%"></div>'
          }
        }
        // Fill remaining days with empty bars
        var totalDays = 90
        var filledDays = data.daily ? data.daily.length : 0
        for (var k = 0; k < totalDays - filledDays; k++) {
          barsHtml = '<div class="uptime-bar uptime-bar--none"></div>' + barsHtml
        }

        var firstDate = data.daily && data.daily.length > 0 ? data.daily[0].date : '90 days ago'
        var lastDate = data.daily && data.daily.length > 0 ? data.daily[data.daily.length - 1].date : 'Today'

        // Incidents
        var incidentsHtml = ''
        if (data.incidents && data.incidents.length > 0) {
          for (var m = 0; m < data.incidents.length; m++) {
            var inc = data.incidents[m]
            var started = new Date(inc.started_at).toLocaleString()
            var dur = inc.duration_seconds
              ? (dur < 60 ? dur + 's' : Math.round(inc.duration_seconds / 60) + ' min')
              : 'Ongoing'
            incidentsHtml += '<div class="incident">' +
              '<div class="incident__time">' + started + '</div>' +
              '<div class="incident__duration">Duration: ' + dur + '</div>' +
              (inc.cause ? '<div class="incident__cause">' + inc.cause + '</div>' : '') +
              '</div>'
          }
        } else {
          incidentsHtml = '<div class="no-incidents">No incidents in the last 90 days</div>'
        }

        content.innerHTML =
          '<h1 class="header__domain">' + data.domain + '</h1>' +
          '<p class="header__updated">Last checked: ' + lastChecked + '</p>' +
          '<div style="text-align:center"><span class="status-badge status-badge--' + statusClass + '"><span class="status-dot"></span>' + statusText + '</span></div>' +
          '<div class="stats">' + statsHtml + '</div>' +
          '<div class="chart-section"><h3>90-Day Uptime</h3><div class="uptime-bars">' + barsHtml + '</div><div class="chart-labels"><span>' + firstDate + '</span><span>' + lastDate + '</span></div></div>' +
          '<div class="incidents"><h3>Recent Incidents</h3>' + incidentsHtml + '</div>' +
          '<div class="footer"><p>Powered by <a href="https://luzerge.com">Luzerge</a> — Website Monitoring & Performance Platform</p></div>'
      }
    })()
  </script>
</body>
</html>
