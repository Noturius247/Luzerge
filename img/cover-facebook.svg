<svg xmlns="http://www.w3.org/2000/svg" width="1640" height="624" viewBox="0 0 1640 624">
  <defs>
    <linearGradient id="fb-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030712"/>
      <stop offset="40%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="fb-glow1" cx="20%" cy="40%" r="40%">
      <stop offset="0%" stop-color="rgba(59,130,246,0.08)"/>
      <stop offset="100%" stop-color="rgba(59,130,246,0)"/>
    </radialGradient>
    <radialGradient id="fb-glow2" cx="85%" cy="30%" r="35%">
      <stop offset="0%" stop-color="rgba(6,182,212,0.06)"/>
      <stop offset="100%" stop-color="rgba(6,182,212,0)"/>
    </radialGradient>
    <radialGradient id="fb-sphere" cx="38%" cy="32%" r="58%">
      <stop offset="0%" stop-color="#122a4a"/>
      <stop offset="60%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#060c18"/>
    </radialGradient>
    <radialGradient id="fb-shine" cx="32%" cy="22%" r="38%">
      <stop offset="0%" stop-color="rgba(6,182,212,0.3)"/>
      <stop offset="100%" stop-color="rgba(6,182,212,0)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1640" height="624" fill="url(#fb-bg)"/>
  <rect width="1640" height="624" fill="url(#fb-glow1)"/>
  <rect width="1640" height="624" fill="url(#fb-glow2)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="624"/><line x1="80" y1="0" x2="80" y2="624"/>
    <line x1="160" y1="0" x2="160" y2="624"/><line x1="240" y1="0" x2="240" y2="624"/>
    <line x1="320" y1="0" x2="320" y2="624"/><line x1="400" y1="0" x2="400" y2="624"/>
    <line x1="480" y1="0" x2="480" y2="624"/><line x1="560" y1="0" x2="560" y2="624"/>
    <line x1="640" y1="0" x2="640" y2="624"/><line x1="720" y1="0" x2="720" y2="624"/>
    <line x1="800" y1="0" x2="800" y2="624"/><line x1="880" y1="0" x2="880" y2="624"/>
    <line x1="960" y1="0" x2="960" y2="624"/><line x1="1040" y1="0" x2="1040" y2="624"/>
    <line x1="1120" y1="0" x2="1120" y2="624"/><line x1="1200" y1="0" x2="1200" y2="624"/>
    <line x1="1280" y1="0" x2="1280" y2="624"/><line x1="1360" y1="0" x2="1360" y2="624"/>
    <line x1="1440" y1="0" x2="1440" y2="624"/><line x1="1520" y1="0" x2="1520" y2="624"/>
    <line x1="1600" y1="0" x2="1600" y2="624"/>
    <line x1="0" y1="80" x2="1640" y2="80"/><line x1="0" y1="160" x2="1640" y2="160"/>
    <line x1="0" y1="240" x2="1640" y2="240"/><line x1="0" y1="320" x2="1640" y2="320"/>
    <line x1="0" y1="400" x2="1640" y2="400"/><line x1="0" y1="480" x2="1640" y2="480"/>
    <line x1="0" y1="560" x2="1640" y2="560"/>
  </g>

  <!-- Decorative dots -->
  <circle cx="120" cy="100" r="2" fill="#06b6d4" opacity="0.3"/>
  <circle cx="1500" cy="150" r="2.5" fill="#3b82f6" opacity="0.25"/>
  <circle cx="1400" cy="500" r="2" fill="#8b5cf6" opacity="0.2"/>
  <circle cx="200" cy="480" r="1.5" fill="#06b6d4" opacity="0.2"/>
  <circle cx="800" cy="80" r="1.5" fill="#3b82f6" opacity="0.15"/>
  <circle cx="1300" cy="80" r="1" fill="#06b6d4" opacity="0.2"/>
  <circle cx="350" cy="550" r="1" fill="#8b5cf6" opacity="0.15"/>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1640" height="3" fill="url(#fb-bg)"/>
  <rect x="0" y="0" width="600" height="3" rx="1" fill="#3b82f6" opacity="0.6"/>

  <!-- Logo Icon -->
  <g transform="translate(140, 180)">
    <circle cx="120" cy="120" r="112" fill="url(#fb-sphere)"/>
    <circle cx="120" cy="120" r="112" fill="url(#fb-shine)"/>
    <circle cx="120" cy="120" r="108" fill="none" stroke="#0ea5e9" stroke-width="3" opacity="0.5"/>
    <path d="M142 15L63 131h56l-11 93L190 105H130l12-90z" fill="#3b82f6" stroke="#93c5fd" stroke-width="1.5"/>
    <circle cx="41" cy="56" r="3" fill="#06b6d4" opacity="0.8"/>
    <circle cx="198" cy="48" r="2.5" fill="#3b82f6" opacity="0.7"/>
    <circle cx="190" cy="190" r="2" fill="#8b5cf6" opacity="0.6"/>
  </g>

  <!-- Brand Name -->
  <text x="420" y="275" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="96" font-weight="800" fill="#ffffff" letter-spacing="-1">Luzerge</text>

  <!-- Tagline -->
  <text x="424" y="330" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="400" fill="#94a3b8" letter-spacing="0.5">Website Monitoring &amp; CDN Management Platform</text>

  <!-- Divider line -->
  <rect x="424" y="358" width="80" height="3" rx="1.5" fill="#3b82f6" opacity="0.6"/>

  <!-- Feature pills -->
  <g transform="translate(424, 390)">
    <!-- Uptime Monitoring -->
    <rect x="0" y="0" width="200" height="40" rx="20" fill="rgba(59,130,246,0.1)" stroke="rgba(59,130,246,0.25)" stroke-width="1"/>
    <circle cx="22" cy="20" r="4" fill="#3b82f6"/>
    <text x="36" y="25" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="15" font-weight="500" fill="#93c5fd">Uptime Monitoring</text>

    <!-- CDN Management -->
    <rect x="216" y="0" width="200" height="40" rx="20" fill="rgba(6,182,212,0.1)" stroke="rgba(6,182,212,0.25)" stroke-width="1"/>
    <circle cx="238" cy="20" r="4" fill="#06b6d4"/>
    <text x="252" y="25" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="15" font-weight="500" fill="#67e8f9">CDN Management</text>

    <!-- DDoS Protection -->
    <rect x="432" y="0" width="196" height="40" rx="20" fill="rgba(139,92,246,0.1)" stroke="rgba(139,92,246,0.25)" stroke-width="1"/>
    <circle cx="454" cy="20" r="4" fill="#8b5cf6"/>
    <text x="468" y="25" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="15" font-weight="500" fill="#c4b5fd">DDoS Protection</text>

    <!-- SSL/DNS -->
    <rect x="644" y="0" width="160" height="40" rx="20" fill="rgba(52,211,153,0.1)" stroke="rgba(52,211,153,0.25)" stroke-width="1"/>
    <circle cx="666" cy="20" r="4" fill="#34d399"/>
    <text x="680" y="25" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="15" font-weight="500" fill="#6ee7b7">SSL &amp; DNS Tools</text>
  </g>

  <!-- Stats row -->
  <g transform="translate(424, 460)">
    <text x="0" y="24" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="32" font-weight="800" fill="#3b82f6">300+</text>
    <text x="0" y="48" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="13" font-weight="400" fill="#64748b">Edge Locations</text>

    <text x="180" y="24" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="32" font-weight="800" fill="#06b6d4">&lt;50ms</text>
    <text x="180" y="48" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="13" font-weight="400" fill="#64748b">Avg. Latency</text>

    <text x="370" y="24" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="32" font-weight="800" fill="#8b5cf6">99.9%</text>
    <text x="370" y="48" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="13" font-weight="400" fill="#64748b">Uptime SLA</text>
  </g>

  <!-- Website URL -->
  <text x="424" y="560" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="18" font-weight="500" fill="#64748b">luzerge.com</text>
  <text x="600" y="560" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="18" font-weight="400" fill="#475569">|</text>
  <text x="622" y="560" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="18" font-weight="500" fill="#64748b">luzergeservices@gmail.com</text>

  <!-- Accent line bottom -->
  <rect x="0" y="621" width="1640" height="3" fill="#3b82f6" opacity="0.3"/>

  <!-- Large decorative bolt (background, right side) -->
  <g opacity="0.03" transform="translate(1150, 50)">
    <path d="M280 0L80 320h160l-40 300L480 240H280l40-240z" fill="#3b82f6" stroke="none"/>
  </g>
</svg>
