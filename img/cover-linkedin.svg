    <line x1="1280" y1="0" x2="1280" y2="396"/><line x1="1360" y1="0" x2="1360" y2="396"/>
    <line x1="1440" y1="0" x2="1440" y2="396"/><line x1="1520" y1="0" x2="1520" y2="396"/>
    <line x1="0" y1="80" x2="1584" y2="80"/><line x1="0" y1="160" x2="1584" y2="160"/>
