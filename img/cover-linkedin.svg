  <text x="480" y="340" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="15" font-weight="400" fill="#475569">|</text>
  <text x="498" y="340" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="15" font-weight="500" fill="#64748b">luzergeservices@gmail.com</text>

  <!-- Bottom accent line -->
