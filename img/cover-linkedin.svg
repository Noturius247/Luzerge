    <line x1="640" y1="0" x2="640" y2="396"/><line x1="720" y1="0" x2="720" y2="396"/>
    <line x1="800" y1="0" x2="800" y2="396"/><line x1="880" y1="0" x2="880" y2="396"/>
    <line x1="960" y1="0" x2="960" y2="396"/><line x1="1040" y1="0" x2="1040" y2="396"/>
